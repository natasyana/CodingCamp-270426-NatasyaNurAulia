<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-wrapper">
      <!-- Tombol Dark Mode yang sudah dirapikan posisinya -->
      <button id="dark-mode-toggle" style="padding: 8px 15 px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 20px;">
          🌙 Ubah Tema
      </button>

    <header class="app-header">
      <h1>💰 Budget Visualizer</h1>
      <p class="subtitle">Track your expenses with ease</p>
    </header>

    <!-- Balance Card -->
    <section class="balance-card">
      <p class="balance-label">Total Balance</p>
      <h2 class="balance-amount" id="totalBalance">Rp 0</h2>
      <div class="balance-summary">
        <div class="summary-item income">
          <span class="summary-icon">↑</span>
          <div>
            <p class="summary-label">Income</p>
            <p class="summary-value" id="totalIncome">Rp 0</p>
          </div>
        </div>
        <div class="divider"></div>
        <div class="summary-item expense">
          <span class="summary-icon">↓</span>
          <div>
            <p class="summary-label">Expenses</p>
            <p class="summary-value" id="totalExpense">Rp 0</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Pie Chart -->
    <section class="chart-section">
      <h3 class="section-title">Spending by Category</h3>
      <div class="chart-container">
        <canvas id="expenseChart"></canvas>
        <p class="chart-empty" id="chartEmpty">No expense data yet.</p>
      </div>
    </section>

    <!-- Add Transaction Form -->
    <section class="form-section">
      <h3 class="section-title">Add Transaction</h3>
      <form id="transactionForm" class="transaction-form" novalidate>

        <div class="form-group">
          <label for="itemName">Item / Description</label>
          <input
            type="text"
            id="itemName"
            placeholder="e.g. Lunch, Salary"
            maxlength="50"
            required
          />
          <span class="error-msg" id="itemError"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="amount">Amount (Rp)</label>
            <input
              type="number"
              id="amount"
              placeholder="e.g. 50000"
              min="1"
              required
            />
            <span class="error-msg" id="amountError"></span>
          </div>

          <div class="form-group">
            <label for="type">Type</label>
            <select id="type">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Health">💊 Health</option>
            <option value="Entertainment">🎮 Entertainment</option>
            <option value="Education">📚 Education</option>
            <option value="Salary">💼 Salary</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>

        <button type="submit" class="btn-add">+ Add Transaction</button>
      </form>
    </section>

    <!-- Transaction List -->
    <section class="list-section">
      <div class="list-header">
        <h3 class="section-title">Transactions</h3>
        <button class="btn-clear" id="clearAll" title="Clear all transactions">🗑 Clear All</button>
      </div>
      <ul class="transaction-list" id="transactionList">
        <!-- Items injected by JS -->
      </ul>
      <p class="list-empty" id="listEmpty">No transactions yet. Add one above!</p>
    </section>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
